kind = "web"
previewPath = "/"
title = "Wumpus Squad"
version = "1.0.0"
id = "artifacts/wumpus-squad"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18111

[services.development]
run = "pnpm --filter @workspace/wumpus-squad run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/wumpus-squad", "run", "build" ]
publicDir = "artifacts/wumpus-squad/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18111"
BASE_PATH = "/"
